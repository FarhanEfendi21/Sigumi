<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SIGUMI - Sistem Informasi Mitigasi & Monitoring Aktivitas Gunung Berapi.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SIGUMI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SIGUMI</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #1B2E7B;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
    }
    .logo {
      width: 120px;
      margin-bottom: 24px;
      animation: heartbeat 2s infinite ease-in-out;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid #FFFFFF20;
      border-top: 4px solid #FFD623;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .text {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes heartbeat {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" class="loading-container">
    <img src="favicon.png" class="logo" alt="SIGUMI Logo">
    <div class="loader"></div>
    <div class="text">MEMUAT SIGUMI...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Remove loading indicator after a short delay once Flutter is ready
      // Flutter bootstrap will handle the transition
    });
  </script>
</body>
</html>
