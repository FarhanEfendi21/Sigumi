<!DOCTYPE html>
<html>
<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SIGUMI - Sistem Informasi Mitigasi &amp; Monitoring Aktivitas Gunung Berapi.">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SIGUMI">

  <title>SIGUMI</title>
  <style>
    body {
      background-color: #1B2E7B;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      color: white;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 4px solid #FFFFFF20;
      border-top: 4px solid #FFD623;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .text {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading-indicator" class="loading-container">
    <div class="loader"></div>
    <div class="text">MEMUAT SIGUMI...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
