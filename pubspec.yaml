name: sigumi
description: "SIGUMI - Sistem Informasi Gunung Berapi Mitigasi"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.0-0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  geolocator: ^13.0.2
  http: ^1.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_tts: ^4.2.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  image_picker: ^1.0.7
  shadcn_ui: ^0.53.3
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.12.2
  speech_to_text: ^7.0.0
  string_similarity: ^2.2.0
  tflite_audio: ^0.3.0

  flutter_map_cancellable_tile_provider: ^3.0.2
  webview_flutter: ^4.10.0
  flip_card: ^0.7.0
  carousel_slider: ^5.1.2
  share_plus: ^13.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/education/
    - assets/onboarding/
    - assets/ml/

  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/LogoAPPS.png"
  min_sdk_android: 21
